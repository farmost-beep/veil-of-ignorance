<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无知之幕 · 中国历史人口概率</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #f0883e;
  --accent2: #58a6ff;
  --border: #30363d;
  --prob-high: #f0883e;
  --prob-mid: #d29922;
  --prob-low: #58a6ff;
  --prob-bg: #1c2128;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* Layout */
.app-container {
  display: flex; flex-direction: column; height: 100vh;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 1000;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.header h1 span { color: var(--accent); }
.header .subtitle { font-size: 12px; color: var(--text2); }
.header .stats { font-size: 13px; color: var(--text2); text-align: right; }

/* Main content */
.main-content {
  display: flex; flex: 1; min-height: 0;
}

/* Map panel */
.map-panel {
  flex: 1; position: relative; min-width: 0;
}
#map { width: 100%; height: 100%; }
.map-legend {
  position: absolute; bottom: 70px; left: 12px; z-index: 1000;
  background: rgba(13,17,23,0.92); padding: 10px 14px; border-radius: 8px;
  border: 1px solid var(--border); font-size: 12px; min-width: 160px;
}
.map-legend .title { font-weight: 500; margin-bottom: 6px; font-size: 11px; color: var(--text2); letter-spacing: 0.5px; }
.map-legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
.map-legend .swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }

/* Side panel */
.side-panel {
  width: 400px; background: var(--bg2); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}

/* Period info */
.period-info {
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.period-info .period-name {
  font-size: 22px; font-weight: 700; color: var(--accent);
}
.period-info .period-years { font-size: 13px; color: var(--text2); margin: 2px 0 4px; }
.period-info .period-pop {
  font-size: 13px; color: var(--text2); display: flex; gap: 16px;
}
.period-info .period-pop span strong { color: var(--text); }

/* Top 10 */
.top10-section {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.top10-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px; font-size: 13px; color: var(--text2); letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.top10-item {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 20px; cursor: pointer; transition: background 0.15s;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.top10-item:hover { background: rgba(255,255,255,0.03); }
.top10-item.active { background: rgba(240,136,62,0.08); border-left: 3px solid var(--accent); padding-left: 17px; }
.top10-rank {
  width: 24px; font-size: 14px; font-weight: 700; color: var(--text2); flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; text-align: center;
}
.top10-rank.gold { color: #f0c040; }
.top10-rank.silver { color: #a8b4c0; }
.top10-rank.bronze { color: #cd7f32; }
.top10-info { flex: 1; min-width: 0; }
.top10-info .top10-period { font-size: 13px; font-weight: 500; }
.top10-info .top10-detail { font-size: 12px; color: var(--text2); display: flex; gap: 8px; }
.top10-info .top10-detail span { background: var(--bg); padding: 0 6px; border-radius: 3px; }
.top10-prob {
  font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}

/* Bottom slider */
.bottom-bar {
  flex-shrink: 0; background: var(--bg2); border-top: 1px solid var(--border);
  padding: 10px 24px 14px;
}
.slider-container { position: relative; padding: 8px 0 0; }
.slider-container input[type=range] {
  width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
  background: linear-gradient(to right, var(--border), var(--accent));
  border-radius: 3px; outline: none; cursor: pointer;
}
.slider-container input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  background: var(--accent); border-radius: 50%; border: 2px solid var(--bg);
  box-shadow: 0 0 8px rgba(240,136,62,0.4); cursor: pointer;
}
.slider-labels {
  display: flex; justify-content: space-between; margin-top: 4px;
  font-size: 10px; color: var(--text2); letter-spacing: 0.3px;
}
.slider-labels span { cursor: pointer; padding: 2px 4px; border-radius: 3px; transition: all 0.15s; }
.slider-labels span:hover { color: var(--text); background: var(--bg3); }
.slider-labels span.active { color: var(--accent); font-weight: 600; }

/* Detail panel overlay */
.detail-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;
}
.detail-overlay.show { display: flex; }
.detail-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px 28px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.detail-card h3 { font-size: 20px; margin-bottom: 4px; }
.detail-card .close {
  float: right; cursor: pointer; font-size: 24px; color: var(--text2);
  line-height: 1; padding: 4px;
}
.detail-card .close:hover { color: var(--text); }
.detail-card .meta { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.detail-card table { width: 100%; font-size: 14px; border-collapse: collapse; }
.detail-card th, .detail-card td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.detail-card th { color: var(--text2); font-weight: 400; font-size: 12px; }
.detail-card .prob-bar {
  height: 8px; border-radius: 4px; background: var(--prob-bg); overflow: hidden; margin-top: 10px;
}
.detail-card .prob-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.detail-card .footnote { font-size: 11px; color: var(--text2); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.detail-card .footnote a { color: var(--accent2); }

/* Sources panel toggle */
.sources-toggle {
  position: absolute; top: 12px; right: 12px; z-index: 1000;
  background: rgba(13,17,23,0.9); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 12px; border-radius: 6px;
  cursor: pointer; font-size: 12px; font-family: inherit;
}
.sources-toggle:hover { color: var(--text); border-color: var(--text2); }

/* Responsive */
@media (max-width: 768px) {
  .main-content { flex-direction: column; }
  .side-panel { width: 100%; max-height: 40vh; }
  .header h1 { font-size: 16px; }
  .header .stats { font-size: 11px; }
  .period-info .period-name { font-size: 18px; }
  .map-legend { bottom: 10px; left: 8px; font-size: 11px; min-width: 130px; }
}

/* Leaflet tweaks */
.leaflet-container { background: var(--bg); }
.region-label {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7);
  text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
  pointer-events: none; font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>▎无知之幕 · <span>中国历史人口概率</span></h1>

        <div class="row"><div class="swatch" style="background:#f0883e;"></div> >1.0%</div>
        <div class="row"><div class="swatch" style="background:#d29922;"></div> 0.3–1.0%</div>
        <div class="row"><div class="swatch" style="background:#58a6ff;"></div> 0.1–0.3%</div>
        <div class="row"><div class="swatch" style="background:#1c6b8f;"></div> 0.03–0.1%</div>
        <div class="row"><div class="swatch" style="background:#0d3b4f;"></div> &lt;0.03%</div>
      </div>
      <button class="sources-toggle" onclick="showSources()">📚 数据来源</button>
    </div>

    <!-- Side panel -->
    <div class="side-panel">
      <div class="period-info" id="periodInfo">
        <div class="period-name" id="periodName">先秦</div>

      </div>

      <div class="top10-section" id="top10List">

          <span>概率</span>
        </div>
        <div id="top10Items">加载中...</div>
      </div>
    </div>
  </div>

  <!-- Bottom slider -->
  <div class="bottom-bar">
    <div class="slider-container">
      <input type="range" id="timeSlider" min="0" max="11" value="0" step="1">
      <div class="slider-labels" id="sliderLabels"></div>
    </div>
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-card" id="detailCard">
    <span class="close" onclick="closeDetail()">&times;</span>
    <h3 id="detailTitle"></h3>
    <div class="meta" id="detailMeta"></div>
    <table id="detailTable"></table>
    <div class="prob-bar" id="detailProbBar">
      <div class="prob-bar-fill" id="detailProbFill"></div>
    </div>
    <div class="footnote" id="detailFootnote"></div>
  </div>
</div>

// ============================================================
// PROBABILITY CALCULATOR
// ============================================================

function calcProbabilities(periodIdx) {
  const p = PERIODS[periodIdx];
  const results = [];
  for (const [rkey, rshare] of Object.entries(p.regions)) {
    if (rshare === 0) continue;
    for (const [ckey, cshare] of Object.entries(p.classes)) {
      if (cshare === 0) continue;
      const prob = (p.births / TOTAL_BIRTHS) * rshare * cshare;
      results.push({ periodIdx, region: rkey, class: ckey, prob });
    }
  }
  results.sort((a, b) => b.prob - a.prob);
  return results;
}

function getRegionProb(regionKey, periodIdx) {
  const p = PERIODS[periodIdx];
  return (p.births / TOTAL_BIRTHS) * (p.regions[regionKey] || 0);
}

// ============================================================
// MAP SETUP
// ============================================================

const map = L.map('map', {
  center: [35, 107], zoom: 4,
  zoomControl: true, attributionControl: false,
  scrollWheelZoom: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
}).addTo(map);

const regionLayers = {};
const regionLabels = {};

// Function to get color based on probability
function getProbColor(prob) {
  if (prob > 0.01) return { fill: '#f0883e', weight: 1.5 };
  if (prob > 0.003) return { fill: '#d29922', weight: 1.0 };
  if (prob > 0.001) return { fill: '#58a6ff', weight: 0.8 };
  if (prob > 0.0003) return { fill: '#1c6b8f', weight: 0.5 };
  return { fill: '#0d3b4f', weight: 0.3 };
}

function buildMap(periodIdx) {
  // Clear existing layers
  Object.values(regionLayers).forEach(l => map.removeLayer(l));
  Object.values(regionLabels).forEach(l => map.removeLayer(l));
  Object.keys(regionLayers).forEach(k => delete regionLayers[k]);
  Object.keys(regionLabels).forEach(k => delete regionLabels[k]);

  const totalRegionProb = {};
  for (const rkey of Object.keys(REGIONS)) {
    totalRegionProb[rkey] = getRegionProb(rkey, periodIdx);
  }

  for (const [rkey, coords] of Object.entries(REGION_POLYGONS)) {
    const prob = totalRegionProb[rkey];
    const color = getProbColor(prob);
    const layer = L.polygon(coords, {
      color: 'rgba(255,255,255,0.25)',
      weight: color.weight,
      fillColor: color.fill,
      fillOpacity: 0.55 + Math.min(prob * 30, 0.35),
      smoothFactor: 1.5
    }).addTo(map);

    const r = REGIONS[rkey];
    layer.bindTooltip(`${r.name}\n概率: ${(prob * 100).toFixed(2)}%`, {
      direction: 'center', className: 'region-tooltip'
    });

    layer.on('click', () => showRegionDetail(rkey, periodIdx));
    layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.75, weight: 2 }); });
    layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.55 + Math.min(prob * 30, 0.35), weight: color.weight }); });

    regionLayers[rkey] = layer;

    // Labels
    const label = L.marker([r.lat, r.lng], {
      icon: L.divIcon({
        className: 'region-label',
        html: r.name,
        iconSize: [80, 20],
        iconAnchor: [40, 10]
      }),
      interactive: false
    }).addTo(map);
    regionLabels[rkey] = label;
  }
}

function renderTop10(periodIdx) {
  const results = calcProbabilities(periodIdx);
  const top10 = results.slice(0, 10);
  const container = document.getElementById('top10Items');

  container.innerHTML = top10.map((item, i) => {
    const p = PERIODS[item.periodIdx];
    const r = REGIONS[item.region];
    const c = CLASSES[item.class] || { name: item.class, icon: '' };
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const probPct = (item.prob * 100).toFixed(3);

    return `
      <div class="top10-item ${i === 0 ? 'active' : ''}" onclick="showComboDetail(${i})" data-idx="${i}">
        <div class="top10-rank ${rankClass}">${i + 1}</div>
        <div class="top10-info">
          <div class="top10-period">${c.icon} ${r.name} · ${c.name}</div>
          <div class="top10-detail">
            <span>${p.name}</span>
            <span>${p.label}</span>
          </div>
        </div>
        <div class="top10-prob">${probPct}%</div>
      </div>
    `;
  }).join('');
}

function showRegionDetail(rkey, periodIdx) {
  const p = PERIODS[periodIdx];
  const r = REGIONS[rkey];
  const regionProb = getRegionProb(rkey, periodIdx);

  document.getElementById('detailTitle').textContent = `${r.name} · ${p.name}`;
  document.getElementById('detailMeta').textContent = `区域概率: ${(regionProb * 100).toFixed(3)}% · 该时期南方北部分布详见下图`;

  const classData = Object.entries(p.classes)
    .filter(([k]) => p.classes[k] > 0)
    .map(([k, v]) => {
      const c = CLASSES[k] || { name: k, icon: '' };
      const classProb = regionProb * v;
      return { name: `${c.icon} ${c.name}`, share: v, prob: classProb, desc: c.desc || '' };
    })
    .sort((a, b) => b.prob - a.prob);

  let tableHtml = `<tr><th>阶级</th><th>区域占比</th><th>全局概率</th><th>说明</th></tr>`;
  classData.forEach(d => {
    tableHtml += `<tr><td>${d.name}</td><td>${(d.share * 100).toFixed(1)}%</td><td>${(d.prob * 100).toFixed(3)}%</td><td style="font-size:12px;color:var(--text2)">${d.desc}</td></tr>`;
  });

  document.getElementById('detailTable').innerHTML = tableHtml;

  const maxProb = classData[0].prob;
  document.getElementById('detailProbFill').style.width = '100%';
  document.getElementById('detailProbFill').style.background = `linear-gradient(90deg, ${getProbColor(regionProb).fill}, ${getProbColor(regionProb).fill})`;

  document.getElementById('detailFootnote').innerHTML = `模型基于 <a href="#" onclick="showSources();return false;">葛剑雄《中国人口史》</a>、<a href="#" onclick="showSources();return false;">曹树基(2024)</a> 等学者数据构建。各时期人口估计有±5–50%的不确定性，详见数据来源。`;

  document.getElementById('detailOverlay').classList.add('show');
}

function showComboDetail(idx) {
  const results = calcProbabilities(currentPeriod);
  const item = results[idx];
  if (!item) return;

  const p = PERIODS[item.periodIdx];
  const r = REGIONS[item.region];
  const c = CLASSES[item.class] || { name: item.class, icon: '', desc: '' };
  const probPct = (item.prob * 100).toFixed(3);

  document.getElementById('detailTitle').textContent = `#${idx + 1} ${r.name} · ${c.name}`;
  document.getElementById('detailMeta').textContent = `${p.name} (${p.label}) · 全局概率 ${probPct}% · ${p.note}`;

  let tableHtml = `<tr><th>维度</th><th>值</th><th>备注</th></tr>`;
  tableHtml += `<tr><td>时期</td><td>${p.name}</td><td style="font-size:12px;color:var(--text2)">${p.years}年 · 年均约${p.avgPop}M人 · 出生${p.births}M</td></tr>`;
  tableHtml += `<tr><td>区域</td><td>${r.name}</td><td style="font-size:12px;color:var(--text2)">该时期区域占比 ${(p.regions[item.region] * 100).toFixed(1)}%</td></tr>`;
  tableHtml += `<tr><td>阶级</td><td>${c.icon} ${c.name}</td><td style="font-size:12px;color:var(--text2)">${c.desc || ''} · 该时期占比 ${(p.classes[item.class] * 100).toFixed(1)}%</td></tr>`;

  document.getElementById('detailTable').innerHTML = tableHtml;

  const barEl = document.getElementById('detailProbFill');
  barEl.style.width = `${Math.min(item.prob * 10000, 100)}%`;
  barEl.style.background = 'linear-gradient(90deg, #f0883e, #f0c040)';

  document.getElementById('detailFootnote').innerHTML = `模型基于葛剑雄《中国人口史》、曹树基"中国人口史(1368-1953)"(Brill 2024)、赵文林/谢淑君、路遇/滕泽之等学者数据。总出生人数估计参考PRB/Haub方法。不确定性：古代±40-50%，近现代±5-10%。`;

  document.getElementById('detailOverlay').classList.add('show');
}

  document.getElementById('detailOverlay').classList.remove('show');
}

  const sources = [
    { author: '葛剑雄', work: '《中国人口史》(六卷本)/《中国人口发展史》', note: '复旦大学出版社，核心参考：历代人口总量与区域分布' },

    { author: '赵文林、谢淑君', work: '《中国人口史》', note: '人民出版社，历代人口估算' },

  let html = '<table><tr><th>来源</th><th>著作</th><th style="font-size:11px">说明</th></tr>';

  });
  html += '</table>';
  html += '<div class="footnote" style="margin-top:8px"><strong>模型局限：</strong><br>1. 公元前数据为考古推断，不确定性±40-50%<br>2. 公元0-1000年有限文字记录，不确定性±25-35%<br>3. 各时期区域份额为宏观估算，非精确统计数据<br>4. 阶级结构使用"士农工商"传统四分法+奴婢/其他，实际边界模糊<br>5. 模型中"出生人数"使用各时期平均人口×出生率×年数估算<br>6. 区域分界为示意性宏观区域，不代表精确行政边界</div>';

let currentPeriod = 0;

function renderSliderLabels() {
  const container = document.getElementById('sliderLabels');
  container.innerHTML = PERIODS.map((p, i) =>
    `<span data-idx="${i}" class="${i === currentPeriod ? 'active' : ''}">${p.name}</span>`
  ).join('');
  container.querySelectorAll('span').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      document.getElementById('timeSlider').value = idx;
      updateView(idx);
    });
  });
}

function updateView(idx) {
  currentPeriod = idx;
  const p = PERIODS[idx];

  // Update period info
  document.getElementById('periodName').textContent = p.name;
  document.getElementById('periodYears').textContent = p.label;
  document.getElementById('periodPop').textContent = p.avgPop + 'M';
  document.getElementById('periodBirths').textContent = (p.births >= 1000 ? (p.births / 1000).toFixed(1) + 'B' : p.births + 'M');
  document.getElementById('periodShare').textContent = (p.births / TOTAL_BIRTHS * 100).toFixed(1) + '%';
  document.getElementById('headerStats').innerHTML = `总人口基数: <strong>~${(TOTAL_BIRTHS / 1000).toFixed(1)}B</strong> · ${p.name}`;

  // Update slider labels
  document.querySelectorAll('#sliderLabels span').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // Update map
  buildMap(idx);

  // Update top 10
  renderTop10(idx);
}

// Initialize slider
const slider = document.getElementById('timeSlider');
slider.addEventListener('input', () => updateView(parseInt(slider.value)));
